<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create User</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top left, rgba(53, 122, 255, 0.22), transparent 30%),
                linear-gradient(160deg, #0b1019, #111a29 45%, #0d1524);
            color: #f5f7fa;
            font-family: "Segoe UI", sans-serif;
        }
        form {
            width: min(420px, 92vw);
            background: rgba(14, 20, 33, 0.95);
            border: 1px solid #263451;
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 8px;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #2b3b5d;
            background: #10192b;
            color: white;
        }
        button, a {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 999px;
            text-decoration: none;
            border: 0;
        }
        button {
            background: #2f7cf6;
            color: white;
            cursor: pointer;
        }
        a {
            color: #9fd0ff;
            margin-left: 12px;
        }
        .error-summary {
            margin: 0 0 18px;
            padding: 12px 14px;
            border-radius: 12px;
            background: rgba(201, 59, 59, 0.16);
            border: 1px solid rgba(255, 120, 120, 0.32);
            color: #ffb6b6;
        }
        .field-error {
            margin: 0 0 14px;
            font-size: 13px;
            color: #ffb6b6;
        }
    </style>
</head>
<body>
<form th:action="@{/users}" method="post" th:object="${form}">
    <h1>Create User</h1>

    <div class="error-summary" th:if="${#fields.hasGlobalErrors()}">
        <div th:each="error : ${#fields.globalErrors()}" th:text="${error}"></div>
    </div>

    <label for="username">Username</label>
    <input id="username" type="text" th:field="*{username}" required>
    <div class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>

    <label for="password">Password</label>
    <input id="password" type="password" th:field="*{password}" required>
    <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>

    <button type="submit">Create</button>
    <a th:href="@{/users}">Back</a>
</form>
</body>
</html>
